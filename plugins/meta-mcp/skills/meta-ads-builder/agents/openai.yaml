interface:
  display_name: "Meta Ads Builder"
  short_description: "Publish Meta ads from an image plus a saved site profile"
  default_prompt: "Use $meta-ads-builder to publish a paused Meta ad from /absolute/path/to/image.jpg for the selected site profile."

dependencies:
  tools:
    - type: "mcp"
      value: "meta"
      description: "Meta Ads MCP server for campaign, ad set, creative, and analytics operations"

policy:
  allow_implicit_invocation: true
